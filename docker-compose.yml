services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: echochamber
      POSTGRES_USER: echochamber
      POSTGRES_PASSWORD: echochamber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reexec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echochamber"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: echochamber
      DB_USER: echochamber
      DB_PASSWORD: echochamber
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN}
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
    networks:
      - reexec-net
    depends_on:
      db:
        condition: service_healthy

# Shared bridge network with a stable name so SnapReq — run from its own compose project —
# can attach to it and reach EchoChamber at http://app:8080/internal/ingest in dev. On the
# SnapReq side, declare it as external:
#
#   networks:
#     reexec-net:
#       external: true
networks:
  reexec-net:
    name: reexec-net
    driver: bridge

volumes:
  postgres_data:
