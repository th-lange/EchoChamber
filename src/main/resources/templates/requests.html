<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Retriable requests</title></head>
<body>
<nav>
    <a th:href="@{/admin/requests}">Requests</a> |
    <a th:href="@{/admin/history}">Retry history</a> |
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}">Users</a> |
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/audit}">Audit</a> |
    <form th:action="@{/logout}" method="post" style="display:inline"><button type="submit">Logout</button></form>
</nav>
<h1>Retriable requests</h1>
<table border="1" cellpadding="4">
    <thead><tr><th>Method</th><th>Authority</th><th>URI</th><th>Captured</th><th sec:authorize="hasAnyRole('OPERATOR','ADMIN')">Retry</th></tr></thead>
    <tbody>
    <tr th:each="r : ${requests}">
        <td th:text="${r.method}">GET</td>
        <td th:text="${r.authority}">example.com</td>
        <td th:text="${r.uri}">/api</td>
        <td th:text="${r.capturedAt}">t</td>
        <td sec:authorize="hasAnyRole('OPERATOR','ADMIN')">
            <form th:action="@{'/admin/requests/' + ${r.id} + '/retry'}" method="post">
                <input type="text" name="configId" placeholder="config UUID" size="36" required>
                <input type="text" name="targetUrl" placeholder="target URL (optional)">
                <input type="text" name="pathOverride" placeholder="/path (optional)">
                <textarea name="headersSet" placeholder="Header: value (one per line)" rows="2"></textarea>
                <textarea name="bodyPatches" placeholder="field=value (one per line)" rows="2"></textarea>
                <button type="submit">Retry</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
