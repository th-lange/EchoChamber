services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: echochamber
      POSTGRES_USER: echochamber
      POSTGRES_PASSWORD: echochamber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reexec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echochamber"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: echochamber
      DB_USER: echochamber
      DB_PASSWORD: echochamber
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN}
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
    networks:
      - reexec-net
    depends_on:
      db:
        condition: service_healthy

  # SnapReq sidecar — joins the shared network so it can POST captured requests to
  # http://app:8080/internal/ingest in dev. Profile-gated because ../SnapReq does not yet
  # have a runnable build / Dockerfile (tracked in th-lange/SnapReq). Default `docker
  # compose up` brings up db + app only; `docker compose --profile fullstack up` adds this.
  snapreq:
    build: ../SnapReq
    profiles: ["fullstack"]
    environment:
      ECHOCHAMBER_URL: http://app:8080
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN}
    networks:
      - reexec-net
    depends_on:
      - app

networks:
  reexec-net:
    driver: bridge

volumes:
  postgres_data:
