<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change password — EchoChamber</title>
    <link rel="stylesheet" th:href="@{/css/console.css}">
</head>
<body>
<div class="login-wrap">
    <div class="topbar">
        <div class="brand">EchoChamber <span class="subtitle">admin console</span></div>
    </div>
    <div class="card">
        <h1>Change your password</h1>
        <p class="info">You must set a new password before continuing.</p>
        <form th:action="@{/admin/password}" method="post">
            <label>New password
                <input type="password" name="newPassword" required autofocus>
            </label>
            <button type="submit">Update password</button>
        </form>
    </div>
</div>
</body>
</html>
