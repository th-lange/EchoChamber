<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>EchoChamber — Login</title></head>
<body>
<h1>EchoChamber Admin</h1>
<p th:if="${param.error}" style="color:red">Invalid username or password.</p>
<p th:if="${param.logout}">You have been logged out.</p>
<form th:action="@{/login}" method="post">
    <p><label>Username <input type="text" name="username" autofocus></label></p>
    <p><label>Password <input type="password" name="password"></label></p>
    <button type="submit">Sign in</button>
</form>
</body>
</html>
