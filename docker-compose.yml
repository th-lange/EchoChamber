services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: echochamber
      POSTGRES_USER: echochamber
      POSTGRES_PASSWORD: echochamber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reexec-net
    healthcheck:
      # Probe over TCP (-h 127.0.0.1) so the check can't pass against the unix-socket-only
      # server the postgres image runs during first-boot initialisation — otherwise the app
      # is released too early and Flyway fails with a connection error (SQLSTATE 08001).
      test: ["CMD-SHELL", "pg_isready -U echochamber -d echochamber -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: echochamber
      DB_USER: echochamber
      DB_PASSWORD: echochamber
      # Sensible dev defaults so `docker compose up` works with no setup; override via .env.
      # Empty by default => ingest auth is DISABLED for local dev. Set a value to require it.
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN:-}
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin}
    networks:
      - reexec-net
    depends_on:
      db:
        condition: service_healthy

# Shared bridge network with a stable name so SnapReq — run from its own compose project —
# can attach to it and reach EchoChamber at http://app:8080/internal/ingest in dev. On the
# SnapReq side, declare it as external:
#
#   networks:
#     reexec-net:
#       external: true
networks:
  reexec-net:
    name: reexec-net
    driver: bridge

volumes:
  postgres_data:
