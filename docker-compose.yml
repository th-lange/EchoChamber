services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: echochamber
      POSTGRES_USER: echochamber
      POSTGRES_PASSWORD: echochamber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echochamber"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: echochamber
      DB_USER: echochamber
      DB_PASSWORD: echochamber
      INTERNAL_INGEST_TOKEN: ${INTERNAL_INGEST_TOKEN}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
