<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EchoChamber — Sign in</title>
    <link rel="stylesheet" th:href="@{/css/console.css}">
</head>
<body>
<div class="login-wrap">
    <div class="topbar">
        <div class="brand">EchoChamber <span class="subtitle">admin console</span></div>
    </div>
    <div class="card">
        <h1>Sign in</h1>
        <p class="info">Use your admin console account.</p>
        <div class="alert error" th:if="${param.error}">Invalid username or password.</div>
        <div class="alert note" th:if="${param.logout}">You have been logged out.</div>
        <form th:action="@{/login}" method="post">
            <label>Username
                <input type="text" name="username" autofocus>
            </label>
            <label>Password
                <input type="password" name="password">
            </label>
            <button type="submit">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
